default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: managebug
  password: password
  host: localhost

development:
  <<: *default
  database: managebug_development

test:
  <<: *default
  database: managebug_test

production:
  primary:
    <<: *default
    database: managebug_production
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host: <%= ENV.fetch("PG_HOST", "localhost") %>
  cache:
    <<: *default
    database: managebug_production_cache
    migrations_paths: db/cache_migrate
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host: <%= ENV.fetch("PG_HOST", "localhost") %>
  queue:
    <<: *default
    database: managebug_production_queue
    migrations_paths: db/queue_migrate
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host: <%= ENV.fetch("PG_HOST", "localhost") %>
  cable:
    <<: *default
    database: managebug_production_cable
    migrations_paths: db/cable_migrate
    username: <%= ENV["PG_USERNAME"] %>
    password: <%= ENV["PG_PASSWORD"] %>
    host: <%= ENV.fetch("PG_HOST", "localhost") %>
